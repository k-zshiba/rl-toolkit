name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p rl-common -p rl-replay-harvester -p rl-replay2json

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/release/rl-toolkit dist/
          cp target/release/rl-replay-harvester dist/
          cp target/release/rl-replay2json dist/
          chmod +x dist/rl-toolkit dist/rl-replay-harvester dist/rl-replay2json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/rl-toolkit
            dist/rl-replay-harvester
            dist/rl-replay2json

  build-windows:
    name: Build Windows Binaries
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p rl-common -p rl-replay-harvester -p rl-replay2json

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target\release\rl-toolkit.exe dist\
          Copy-Item target\release\rl-replay-harvester.exe dist\
          Copy-Item target\release\rl-replay2json.exe dist\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/*.exe

  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-binaries"
          merge-multiple: true
          path: dist

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/rl-toolkit
            dist/rl-replay-harvester
            dist/rl-replay2json
            dist/*.exe
