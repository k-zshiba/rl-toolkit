name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cli-checks-linux:
    name: CLI Checks (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (CLI crates)
        run: cargo clippy -p rl-replay-harvester -p rl-replay2json --all-targets -- -D warnings

      - name: Test (CLI crates)
        run: cargo test -p rl-replay-harvester -p rl-replay2json

  workspace-check-windows:
    name: Workspace Check (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
